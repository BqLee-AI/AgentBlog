name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test API
        run: bun run --filter @agentblog/api test

      - name: Test web
        run: bun run --filter @agentblog/web test

      - name: Build applications
        run: bun run build

      - name: Build API image
        run: docker build --tag agentblog-api:ci .
