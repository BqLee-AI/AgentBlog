# AgentBlog 前端同源部署模板（docs/design/frontend/09 §7.2）
#
# 默认场景：同机 Nginx 托管 apps/web/dist，并反代后端 Bun 服务。
# 若改为独立前端容器，保留相同 location / SSE 配置，但把 upstream
# 从 127.0.0.1 改成容器网络内可达地址（例如 http://api:3000）。

server {
    listen 80;
    server_name _;

    root /opt/agentblog/web/dist;
    index index.html;

    # SPA 回退：前端路由如 /posts/:slug 直接刷新也回 index.html。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/chat 走同一路径，因此这里必须禁 buffering，避免 SSE 被网关攒包。
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_cache off;
    }

    location ^~ /mcp {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_cache off;
    }

    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
